AWSTemplateFormatVersion: "2010-09-09"
Description: "LexAI - Single EC2 instance (cheapest option, ~$5/month)"

Parameters:
  EnvironmentName:
    Type: String
    Default: production
    Description: Environment name

  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t4g.nano
      - t3.micro
    Description: "t4g.nano (~$4.18/mo) or t3.micro (free tier eligible)"

  AmiId:
    Type: String
    Default: ami-009be0edec0817ffd
    Description: Amazon Linux 2023 x86_64 AMI (Python 3.11 built-in)

  SshKeyName:
    Type: String
    Description: Name of an existing EC2 key pair for SSH access
    MinLength: 1

Resources:
  # Security Group - minimal ports
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP (5000) and SSH from GitHub Actions
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5000
          ToPort: 5000
          CidrIp: 0.0.0.0/0
          Description: Flask app access
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: SSH (restrict to GitHub Actions IPs in production)

  # VPC (default VPC is free)
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  # IAM Role for EC2 (Bedrock access)
  Ec2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                  - bedrock:Converse
                Resource: "*"
  Ec2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref Ec2Role

  # Elastic IP (free when attached)
  ElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  ElasticIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt ElasticIP.AllocationId
      InstanceId: !Ref Ec2Instance

  # EC2 Instance
  Ec2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref AmiId
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      IamInstanceProfile: !Ref Ec2InstanceProfile
      KeyName: !Ref SshKeyName
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-lexai"
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -ex

          # System updates
          dnf update -y
          dnf install -y python3 python3-pip python3-devel git --allowerasing

          # Install Python deps
          pip3 install --no-cache-dir flask boto3 python-docx docxtpl reportlab gunicorn

          # Clone app
          cd /home/ec2-user
          git clone https://github.com/bhupenderkumar/legal-app.git /home/ec2-user/legal-app || true
          cd /home/ec2-user/legal-app
          pip3 install --no-cache-dir -r requirements.txt

          # Create .env with defaults
          cat > /home/ec2-user/legal-app/.env << 'EOF'
          AWS_REGION=ap-south-1
          LEXAI_MODEL=amazon.nova-pro-v1:0
          FLASK_ENV=production
          EOF

          # Ensure proper permissions
          chown -R ec2-user:ec2-user /home/ec2-user/legal-app

          # Create systemd service
          cat > /etc/systemd/system/lexai.service << 'SERVICEEOF'
          [Unit]
          Description=LexAI Legal Intelligence Platform
          After=network.target

          [Service]
          Type=simple
          User=ec2-user
          WorkingDirectory=/home/ec2-user/legal-app/legal_app
          EnvironmentFile=/home/ec2-user/legal-app/.env
          ExecStart=/usr/local/bin/gunicorn --bind 0.0.0.0:5000 --workers 2 --timeout 120 app:app
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          SERVICEEOF

          systemctl daemon-reload
          systemctl enable lexai
          systemctl start lexai

          # Simple status check
          sleep 5
          systemctl status lexai --no-pager || true

Outputs:
  PublicIP:
    Description: Public IP of the LexAI instance
    Value: !Ref ElasticIP

  PublicDNS:
    Description: Public DNS of the instance
    Value: !GetAtt Ec2Instance.PublicDnsName

  AppURL:
    Description: URL to access the app
    Value: !Sub "http://${ElasticIP}:5000"

  SSHCommand:
    Description: SSH command to connect
    Value: !Sub "ssh -i ${SshKeyName}.pem ec2-user@${ElasticIP}"
